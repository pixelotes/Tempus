# --- Configuración de la App ---
image:
  repository: pixelotes/fichador  # Cambia esto por tu imagen real
  pullPolicy: IfNotPresent
  tag: "latest"

service:
  type: ClusterIP
  port: 5000

# --- Base de Datos ---
database:
  # Opciones: "sqlite" (no recomendado para producción), "internal" (despliega pod postgres) o "external" (usa RDS/Aurora/Etc)
  type: sqlite

  # Internal se configura desde la ruta .Values.postgresql      
  
  # Solo se usa si type: external
  external:
    host: "mi-aurora-db.aws.com"
    port: 5432
    username: "admin"
    database: "fichador_prod"
    existingSecret:
      name: "secreto-kubernetes"
      key: "password"

  # Solo se usa si type: sqlite
  sqlite:
    persistence:
      enabled: true
      size: 1Gi
      storageClass: "" # Dejar vacío para usar la default

# --- Configuración PostgreSQL Interna (Bitnami Subchart) ---
# Se activa automáticamente si database.type es "internal" (ver lógica abajo no, se controla manual)
# Para usar externa, pon enabled: false
postgresql:
  enabled: false
  auth:
    username: fichador
    password: fichador_password
    database: fichador_db
  # Persistencia de la BBDD interna (puedes desactivarla si quieres que sea efímera)
  primary:
    persistence:
      enabled: true
      size: 1Gi

# --- Exposición (Ingress vs Gateway API) ---
ingress:
  enabled: false
  className: "nginx"
  host: "fichador.local"
  tls: []
  #  - secretName: fichador-tls
  #    hosts:
  #      - fichador.local

gatewayApi:
  enabled: false
  gatewayName: "my-gateway"  # El nombre del Gateway existente en tu cluster
  namespace: "default"       # Namespace del Gateway
  hostname: "fichador.example.com"

# --- Configuración y Secretos ---
# Variables de entorno extra
env: 
  FLASK_ENV: "production"

# Si tienes un secreto creado manualmente (ej: sealed-secrets o external-secrets)
# pon el nombre aquí. La chart cargará todo el contenido como variables de entorno.
existingSecret: ""

# --- Backup Configuration ---
# CronJob que vuelca la base de datos a un repositorio restic (S3, B2, etc.).
# Soporta SQLite (vía `sqlite3 .backup`) y Postgres interno/externo (vía `pg_dump`).
# Las credenciales de AWS pueden venir de un Secret o, en EKS, vía IRSA.
backup:
  enabled: false
  schedule: "0 3 * * *"          # Diario a las 3 AM
  image:
    # IMPORTANTE: la imagen debe incluir restic + sqlite3 + postgresql-client
    repository: pixelotes/tempus-backup
    tag: "latest"
  # Claves requeridas en el Secret: RESTIC_REPOSITORY, RESTIC_PASSWORD
  # Si aws.useIRSA=false también: AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY
  existingSecret: ""
  aws:
    # Si es true, no se inyectan AWS_ACCESS_KEY_ID/AWS_SECRET_ACCESS_KEY para que
    # restic use el token IRSA inyectado por el pod identity webhook de EKS.
    # Requiere ServiceAccount anotada con eks.amazonaws.com/role-arn.
    useIRSA: false
    # Opcional: fija AWS_DEFAULT_REGION (requerido por STS para IRSA en algunos setups)
    region: ""
  serviceAccount:
    # Crea una ServiceAccount dedicada para el CronJob de backup.
    create: false
    # Nombre de la SA. Si create=true y está vacío, usa "<release>-backup".
    # Si create=false, debe apuntar a una SA existente.
    name: ""
    # Anotaciones para la SA. Para IRSA en EKS:
    #   eks.amazonaws.com/role-arn: arn:aws:iam::<account>:role/<role-name>
    annotations: {}
  retention:
    keepDaily: 7
    keepWeekly: 4
    keepMonthly: 6
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
