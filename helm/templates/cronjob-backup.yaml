{{- if .Values.backup.enabled -}}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "fichador.fullname" . }}-backup
  labels:
    {{- include "fichador.labels" . | nindent 4 }}
    app.kubernetes.io/component: backup
spec:
  schedule: {{ .Values.backup.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        metadata:
          labels:
            {{- include "fichador.selectorLabels" . | nindent 12 }}
            app.kubernetes.io/component: backup
        spec:
          restartPolicy: OnFailure
          {{- if or .Values.backup.serviceAccount.create .Values.backup.serviceAccount.name }}
          serviceAccountName: {{ .Values.backup.serviceAccount.name | default (printf "%s-backup" (include "fichador.fullname" .)) }}
          {{- end }}
          containers:
            - name: backup
              image: "{{ .Values.backup.image.repository }}:{{ .Values.backup.image.tag }}"
              command: ["sh", "/scripts/backup.sh"]
              env:
                # --- Database connection ---
                {{- if eq .Values.database.type "sqlite" }}
                - name: DB_TYPE
                  value: "sqlite"
                - name: SQLITE_PATH
                  value: {{ if .Values.database.sqlite.persistence.enabled -}}
                    /data/fichaje.db
                  {{- else -}}
                    /app/fichaje.db
                  {{- end }}
                {{- else if eq .Values.database.type "internal" }}
                - name: DB_TYPE
                  value: "postgres"
                - name: DATABASE_URL
                  value: postgresql://{{ .Values.postgresql.auth.username }}:{{ .Values.postgresql.auth.password }}@{{ include "fichador.fullname" . }}-db:5432/{{ .Values.postgresql.auth.database }}
                {{- else if eq .Values.database.type "external" }}
                - name: DB_TYPE
                  value: "postgres"
                - name: DB_PASSWORD_RAW
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.database.external.existingSecret.name }}
                      key: {{ .Values.database.external.existingSecret.key }}
                - name: DATABASE_URL
                  value: postgresql://{{ .Values.database.external.username }}:$(DB_PASSWORD_RAW)@{{ .Values.database.external.host }}:{{ .Values.database.external.port }}/{{ .Values.database.external.database }}
                {{- end }}
                # --- Restic config (from user-managed Secret) ---
                - name: RESTIC_REPOSITORY
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.backup.existingSecret }}
                      key: RESTIC_REPOSITORY
                - name: RESTIC_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.backup.existingSecret }}
                      key: RESTIC_PASSWORD
                {{- if not .Values.backup.aws.useIRSA }}
                - name: AWS_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.backup.existingSecret }}
                      key: AWS_ACCESS_KEY_ID
                - name: AWS_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.backup.existingSecret }}
                      key: AWS_SECRET_ACCESS_KEY
                {{- end }}
                {{- with .Values.backup.aws.region }}
                - name: AWS_DEFAULT_REGION
                  value: {{ . | quote }}
                {{- end }}
              volumeMounts:
                - name: backup-script
                  mountPath: /scripts
                  readOnly: true
                - name: database-staging
                  mountPath: /backup/database
                {{- if and (eq .Values.database.type "sqlite") .Values.database.sqlite.persistence.enabled }}
                - name: sqlite-data
                  mountPath: /data
                  readOnly: true
                {{- end }}
              resources:
                {{- toYaml .Values.backup.resources | nindent 16 }}
          volumes:
            - name: backup-script
              configMap:
                name: {{ include "fichador.fullname" . }}-backup-script
                defaultMode: 0755
            - name: database-staging
              emptyDir: {}
            {{- if and (eq .Values.database.type "sqlite") .Values.database.sqlite.persistence.enabled }}
            - name: sqlite-data
              persistentVolumeClaim:
                claimName: {{ include "fichador.fullname" . }}-sqlite-pvc
            {{- end }}
{{- end -}}
